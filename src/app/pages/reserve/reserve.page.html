<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/lot"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ lot?.name }} Details</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div class="location-container">

    <div class="map-panel">
      <div #map class="map-container"></div>
    </div>

    <div class="list-panel">
      <h2 class="title">{{ lot?.name }}</h2>

      <h3 class="form-heading">Reservation Details</h3>

      <ion-item>
        <ion-label position="stacked">Vehicle Plate</ion-label>
        <ion-input [(ngModel)]="form.plate" placeholder="Enter vehicle plate"></ion-input>
      </ion-item>

      <div class="divider"></div>

      <h3 class="form-heading">Reservation Period</h3>

      <ion-datetime-button datetime="datetimeIn"></ion-datetime-button>

      <ion-modal [keepContentsMounted]="true">
        <ng-template>
          <ion-datetime
            id="datetimeIn"
            [(ngModel)]="form.timeIn"
            presentation="date-time"
            [formatOptions]="{
              date: {
                weekday: 'short',
                month: 'long',
                day: '2-digit'
              },
              time: {
                hour: '2-digit',
                minute: '2-digit'
              }
            }">
          </ion-datetime>
        </ng-template>
      </ion-modal>

      <ion-datetime-button datetime="datetimeOut"></ion-datetime-button>

      <ion-modal [keepContentsMounted]="true">
        <ng-template>
          <ion-datetime
            id="datetimeOut"
            [(ngModel)]="form.timeOut"
            presentation="date-time"
            [formatOptions]="{
              date: {
                weekday: 'short',
                month: 'long',
                day: '2-digit'
              },
              time: {
                hour: '2-digit',
                minute: '2-digit'
              }
            }">
          </ion-datetime>
        </ng-template>
      </ion-modal>

      <ion-button expand="block" class="reserve-btn" (click)="onReserve()">
        Reserve
      </ion-button>
    </div>

  </div>

</ion-content>
